name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend
        run: rm -rf internal/web/dist && cp -r frontend/dist internal/web/dist

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          BINARY=uniapi-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o $BINARY ./cmd/uniapi
          tar czf $BINARY.tar.gz $BINARY

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: uniapi-*.tar.gz

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - uses: docker/build-push-action@v6
        with:
          push: false
          tags: uniapi/uniapi:${{ github.ref_name }},uniapi/uniapi:latest
