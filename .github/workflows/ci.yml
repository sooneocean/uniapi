name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: cd frontend && npm ci

      - name: Frontend tests
        run: cd frontend && npm run test

      - name: Frontend build
        run: cd frontend && npm run build

  build:
    needs: [test, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend
        run: rm -rf internal/web/dist && cp -r frontend/dist internal/web/dist

      - name: Build binary
        run: CGO_ENABLED=0 go build -o uniapi ./cmd/uniapi

      - name: Smoke test
        run: |
          UNIAPI_DATA_DIR=/tmp/uniapi-test ./uniapi --port 19000 &
          sleep 2
          curl -sf http://localhost:19000/health
          kill %1
